<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartExpense | Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

html,body{
height:100%;
margin:0;
font-family:"Segoe UI",sans-serif;
background:#f8f9fc;
overflow-x:hidden;
}

.left-panel{
background:#f1f4ff;
padding:40px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.app-name{
font-size:26px;
font-weight:700;
color:#2c3e50;
}

.app-slogan{
font-size:13px;
color:#6c757d;
}

.left-image{
max-width:100%;
max-height:42vh;
object-fit:contain;
}

.quote-box{
padding-left:12px;
border-left:4px solid #5a67ff;
}

.quote-text{
font-size:15px;
font-weight:500;
}

.quote-author{
font-size:12px;
color:#6c757d;
}

.register-container{
height:100vh;
display:flex;
align-items:flex-start;
justify-content:center;
background:white;
padding:40px 20px;
overflow-y:auto;
}

.register-card{
width:100%;
max-width:420px;
}

.form-control{
border-radius:8px;
padding:10px;
}

.btn-primary{
background:#5a67ff;
border:none;
border-radius:10px;
padding:10px;
}

.btn-primary:hover{
background:#4954e6;
}

.password-toggle{
cursor:pointer;
}

#msgBox{
border-radius:10px;
font-size:14px;
padding:10px 12px;
margin-bottom:14px;
}

@media(max-width:768px){
.left-panel{display:none;}
}

</style>
</head>

<body>

<div class="container-fluid p-0 h-100">
<div class="row g-0 h-100">

<!-- LEFT PANEL -->

<div class="col-md-5 left-panel">

<div>
<div class="app-name">SmartExpense</div>
<div class="app-slogan">Track. Analyze. Control your money.</div>
</div>

<div class="text-center">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png"
class="left-image">
</div>

<div class="quote-box">
<div class="quote-text">“All your expenses. One smart place.”</div>
<div class="quote-author">— SmartExpense</div>
</div>

</div>

<!-- RIGHT PANEL -->

<div class="col-md-7 register-container">

<div class="register-card">

<h3 class="fw-bold mb-1">Create your account</h3>
<p class="text-muted mb-4">Start tracking your expenses today.</p>

<form id="registerForm">

<div id="msgBox" class="alert d-none"></div>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="fullName" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" required>

<small id="emailMsg" class="fw-semibold"></small>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">
<input type="password" id="password" class="form-control" required>

<span class="input-group-text password-toggle"
onclick="togglePassword('password','eye1')">

<i id="eye1" class="bi bi-eye"></i>

</span>
</div>

<small>Password must be strong (8+ chars, Uppercase, Lowercase, Number, Special symbol)</small>

<small id="passStrength" class="fw-semibold"></small>

</div>

<div class="mb-3">

<label class="form-label">Confirm Password</label>

<div class="input-group">
<input type="password" id="confirmPassword" class="form-control" required>

<span class="input-group-text password-toggle"
onclick="togglePassword('confirmPassword','eye2')">

<i id="eye2" class="bi bi-eye"></i>

</span>
</div>

<small id="confirmMsg" class="fw-semibold"></small>

</div>

<button id="signupBtn" type="submit" class="btn btn-primary w-100 mb-4">
Create Account
</button>

<p class="text-center">
Already have an account?
<a href="login.html">Sign in</a>
</p>

</form>

</div>
</div>
</div>
</div>

<script>

function togglePassword(inputId,iconId){

const input=document.getElementById(inputId);
const icon=document.getElementById(iconId);

if(input.type==="password"){
input.type="text";
icon.classList.replace("bi-eye","bi-eye-slash");
}else{
input.type="password";
icon.classList.replace("bi-eye-slash","bi-eye");
}

}

function showMessage(message,type="danger"){

const msg=document.getElementById("msgBox");

msg.className=`alert alert-${type}`;
msg.innerHTML=message;
msg.classList.remove("d-none");

}

function hideMessage(){
document.getElementById("msgBox").classList.add("d-none");
}

function isValidEmail(email){
const pattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
return pattern.test(email);
}

function isStrongPassword(password){
const pattern=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
return pattern.test(password);
}

const emailInput=document.getElementById("email");
const passwordInput=document.getElementById("password");
const confirmInput=document.getElementById("confirmPassword");

const passStrength=document.getElementById("passStrength");
const confirmMsg=document.getElementById("confirmMsg");
const emailMsg=document.getElementById("emailMsg");

passwordInput.addEventListener("input",function(){

const pwd=passwordInput.value;

if(isStrongPassword(pwd)){
passStrength.innerHTML="✅ Strong Password";
passStrength.className="text-success";
}else{
passStrength.innerHTML="❌ Weak Password";
passStrength.className="text-danger";
}

});

confirmInput.addEventListener("input",function(){

if(passwordInput.value===confirmInput.value){
confirmMsg.innerHTML="✅ Passwords match";
confirmMsg.className="text-success";
}else{
confirmMsg.innerHTML="❌ Passwords do not match";
confirmMsg.className="text-danger";
}

});

emailInput.addEventListener("blur",async function(){

const email=emailInput.value.trim();

if(!isValidEmail(email)) return;

const res=await fetch(`http://localhost:5000/check-email?email=${email}`);
const data=await res.json();

if(data.exists){
emailMsg.innerHTML="❌ Email already registered";
emailMsg.className="text-danger";
}else{
emailMsg.innerHTML="✅ Email available";
emailMsg.className="text-success";
}

});

document.getElementById("registerForm").addEventListener("submit",async function(e){

e.preventDefault();

hideMessage();

const signupBtn=document.getElementById("signupBtn");

signupBtn.disabled=true;
signupBtn.innerHTML="Creating account...";

const fullName=document.getElementById("fullName").value.trim();
const email=emailInput.value.trim();
const password=passwordInput.value;

try{

const response=await fetch("http://localhost:5000/register",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
full_name:fullName,
email:email,
password:password
})

});

const data=await response.json();

if(response.ok){

showMessage("✅ Registration Successful! Redirecting...","success");

setTimeout(()=>{
window.location.href="login.html";
},1200);

}else{

showMessage("❌ "+data.message);

}

}catch{

showMessage("❌ Server error");

}

signupBtn.disabled=false;
signupBtn.innerHTML="Create Account";

});

</script>

</body>
</html>
