<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartExpense | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

html,body{
height:100%;
margin:0;
font-family:"Segoe UI",sans-serif;
background:#f8f9fc;
overflow-x:hidden;
}

.left-panel{
background:#f1f4ff;
padding:40px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.app-name{
font-size:26px;
font-weight:700;
color:#2c3e50;
}

.app-slogan{
font-size:13px;
color:#6c757d;
}

.left-image{
max-width:100%;
max-height:42vh;
object-fit:contain;
}

.quote-box{
padding-left:12px;
border-left:4px solid #5a67ff;
}

.quote-text{
font-size:15px;
font-weight:500;
}

.quote-author{
font-size:12px;
color:#6c757d;
}

.login-container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:white;
padding:20px;
}

.login-card{
width:100%;
max-width:420px;
}

.form-control{
border-radius:8px;
padding:10px;
}

.btn-primary{
background:#5a67ff;
border:none;
border-radius:10px;
padding:10px;
}

.btn-primary:hover{
background:#4954e6;
}

.password-toggle{
cursor:pointer;
}

#msgBox{
border-radius:10px;
font-size:14px;
padding:10px 12px;
margin-bottom:14px;
}

@media(max-width:768px){
.left-panel{display:none;}
}

.page-animate{
animation:fadeInUp .6s ease-out;
}

@keyframes fadeInUp{
from{opacity:0;transform:translateY(12px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container-fluid p-0 h-100">
<div class="row g-0 h-100">

<!-- LEFT PANEL -->

<div class="col-md-5 left-panel">

<div>
<div class="app-name">SmartExpense</div>
<div class="app-slogan">Track. Analyze. Control your money.</div>
</div>

<div class="text-center">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png"
class="left-image">
</div>

<div class="quote-box">
<div class="quote-text">“All your expenses. One smart place.”</div>
<div class="quote-author">— SmartExpense</div>
</div>

</div>

<!-- RIGHT PANEL -->

<div class="col-md-7 login-container page-animate">

<div class="login-card">

<h3 class="fw-bold mb-1">Welcome back</h3>
<p class="text-muted mb-4">Please enter your details.</p>

<form id="loginForm">

<div id="msgBox" class="alert d-none"></div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="loginEmail" class="form-control" required>
</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">
<input type="password" id="loginPassword" class="form-control" required>

<span class="input-group-text password-toggle" onclick="togglePassword()">
<i id="eyeIcon" class="bi bi-eye"></i>
</span>

</div>

</div>

<button id="loginBtn" type="submit" class="btn btn-primary w-100 mb-4">
Sign in
</button>

<p class="text-center">
Don’t have an account?
<a href="register.html">Sign up</a>
</p>

</form>

</div>
</div>
</div>
</div>

<script>

function togglePassword(){

const input=document.getElementById("loginPassword");
const icon=document.getElementById("eyeIcon");

if(input.type==="password"){
input.type="text";
icon.classList.replace("bi-eye","bi-eye-slash");
}else{
input.type="password";
icon.classList.replace("bi-eye-slash","bi-eye");
}

}

function showMessage(message,type="danger"){

const msg=document.getElementById("msgBox");

msg.className=`alert alert-${type}`;
msg.innerHTML=message;
msg.classList.remove("d-none");

}

function hideMessage(){
document.getElementById("msgBox").classList.add("d-none");
}

document.getElementById("loginForm").addEventListener("submit",async function(e){

e.preventDefault();

hideMessage();

const loginBtn=document.getElementById("loginBtn");

loginBtn.disabled=true;
loginBtn.innerHTML="Signing in...";

const email=document.getElementById("loginEmail").value.trim();
const password=document.getElementById("loginPassword").value;

try{

const response=await fetch("http://localhost:5000/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})

});

const data=await response.json();

if(response.ok){

showMessage("✅ Login successful! Redirecting...","success");

localStorage.setItem("user",JSON.stringify(data.user));

setTimeout(()=>{
window.location.href="workspace.html";
},1000);

}else{

showMessage("❌ "+data.message,"danger");

}

}catch(err){

showMessage("❌ Cannot connect to server. Is Flask running?");

}

loginBtn.disabled=false;
loginBtn.innerHTML="Sign in";

});

</script>

</body>
</html>
